<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlumCRM — Gestión de Clientes Aluminio & Ventanas</title>
  <meta name="description" content="Sistema CRM especializado para empresas de aluminio y ventanas. Gestiona clientes, cotizaciones, pedidos e instalaciones." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.9"/>
          <rect x="15" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.6"/>
          <rect x="2" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.6"/>
          <rect x="15" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.3"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">AlumCRM</span>
        <span class="logo-sub">Aluminio & Ventanas</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <span class="nav-label">PRINCIPAL</span>
        <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-label">GESTIÓN</span>
        <a href="#" class="nav-item" data-page="clients" id="nav-clients">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Clientes</span>
          <span class="nav-badge" id="badge-clients">0</span>
        </a>
        <a href="#" class="nav-item" data-page="quotes" id="nav-quotes">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>Cotizaciones</span>
          <span class="nav-badge" id="badge-quotes">0</span>
        </a>
        <a href="#" class="nav-item" data-page="orders" id="nav-orders">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="3" width="15" height="13" rx="1"/>
            <path d="M16 8h4l3 5v3h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
          <span>Pedidos</span>
          <span class="nav-badge" id="badge-orders">0</span>
        </a>
        <a href="#" class="nav-item" data-page="installations" id="nav-installations">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          <span>Instalaciones</span>
        </a>
        <a href="#" class="nav-item" data-page="payments" id="nav-payments">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          <span>Pagos</span>
        </a>
        <a href="#" class="nav-item" data-page="followup" id="nav-followup">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.36 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>
          </svg>
          <span>Seguimiento</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div>
          <div class="user-name">Administrador</div>
          <div class="user-role">CRM Activo</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()" id="menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="page-title-wrap">
          <h1 class="page-title" id="page-title">Dashboard</h1>
          <span class="page-date" id="page-date"></span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-primary" id="topbar-action-btn" onclick="handleTopbarAction()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span id="topbar-action-text">Nuevo Cliente</span>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <div class="page-content" id="page-content">
      <!-- Content rendered by JS -->
    </div>
  </main>

  <!-- Modal overlay -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Título</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- Form content -->
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/db.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/clients.js"></script>
  <script src="js/modules/quotes.js"></script>
  <script src="js/modules/orders.js"></script>
  <script src="js/modules/installations.js"></script>
  <script src="js/modules/payments.js"></script>
  <script src="js/modules/followup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
